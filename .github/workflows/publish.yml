name: Publish to npm

on:
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: packages/eslint-plugin-stackrules
      - run: npm test
        working-directory: packages/eslint-plugin-stackrules

  # Publishes eslint-plugin-stackrules
  # Triggers on any release tag: v0.1.0, v0.2.0, plugin-v1.0.0, etc.
  publish-plugin:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Check if plugin version changed
        id: check-plugin
        run: |
          PUBLISHED=$(npm view eslint-plugin-stackrules version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        working-directory: packages/eslint-plugin-stackrules
      - name: Publish plugin
        if: steps.check-plugin.outputs.skip == 'false'
        run: npm publish --provenance --access public
        working-directory: packages/eslint-plugin-stackrules

  # Publishes create-stackrules CLI
  publish-cli:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Check if CLI version changed
        id: check-cli
        run: |
          PUBLISHED=$(npm view create-stackrules version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        working-directory: packages/cli
      - name: Publish CLI
        if: steps.check-cli.outputs.skip == 'false'
        run: npm publish --provenance --access public
        working-directory: packages/cli
