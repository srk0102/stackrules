name: Test & Publish

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: packages/eslint-plugin-stackrules
      - run: npm test
        working-directory: packages/eslint-plugin-stackrules

  publish-plugin:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Check if version changed
        id: check
        run: |
          PUBLISHED=$(npm view eslint-plugin-stackrules version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          echo "published=$PUBLISHED current=$CURRENT"
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        working-directory: packages/eslint-plugin-stackrules
      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        working-directory: packages/eslint-plugin-stackrules

  publish-cli:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Check if version changed
        id: check
        run: |
          PUBLISHED=$(npm view create-stackrules version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          echo "published=$PUBLISHED current=$CURRENT"
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        working-directory: packages/cli
      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        working-directory: packages/cli
